name: Check for New Versions

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-versions:
    name: Check for Updates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Query for latest versions
        id: versions
        run: |
          echo "Checking upstream releases..."

          GLSLANG=$(curl -s https://api.github.com/repos/KhronosGroup/glslang/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "glslang=$GLSLANG" >> $GITHUB_OUTPUT
          echo "glslang: $GLSLANG"

          SPIRV_CROSS=$(curl -s https://api.github.com/repos/KhronosGroup/SPIRV-Cross/tags | grep '"name"' | grep 'vulkan-sdk-' | head -1 | sed -E 's/.*"name": "([^"]+)".*/\1/')
          echo "spirv_cross=$SPIRV_CROSS" >> $GITHUB_OUTPUT
          echo "SPIRV-Cross: $SPIRV_CROSS"

          WGPU=$(curl -s https://api.github.com/repos/gfx-rs/wgpu-native/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "wgpu=$WGPU" >> $GITHUB_OUTPUT
          echo "wgpu-native: $WGPU"

          NAGA=$(curl -s https://api.github.com/repos/gfx-rs/wgpu/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "naga=$NAGA" >> $GITHUB_OUTPUT
          echo "Naga/wgpu: $NAGA"

          LLVM=$(curl -s https://api.github.com/repos/llvm/llvm-project/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "llvm=$LLVM" >> $GITHUB_OUTPUT
          echo "LLVM: $LLVM"

          SPIRV_TRANSLATOR=$(curl -s https://api.github.com/repos/KhronosGroup/SPIRV-LLVM-Translator/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "spirv_translator=$SPIRV_TRANSLATOR" >> $GITHUB_OUTPUT
          echo "SPIRV-LLVM-Translator: $SPIRV_TRANSLATOR"

          # clspv has no releases — track latest commit on main
          CLSPV=$(curl -s https://api.github.com/repos/google/clspv/commits/main | grep '"sha"' | head -1 | sed -E 's/.*"sha": "([^"]+)".*/\1/' | cut -c1-12)
          echo "clspv=$CLSPV" >> $GITHUB_OUTPUT
          echo "clspv: $CLSPV (main)"

      - name: Check current versions
        id: check
        run: |
          if [ ! -f CURRENT_VERSIONS.txt ]; then
            echo "No CURRENT_VERSIONS.txt found, creating initial version"
            echo "needs_release=true" >> $GITHUB_OUTPUT
          else
            CURRENT_GLSLANG=$(grep "GLSLANG=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")
            CURRENT_SPIRV_CROSS=$(grep "SPIRV_CROSS=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")
            CURRENT_WGPU=$(grep "WGPU=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")
            CURRENT_NAGA=$(grep "NAGA=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")
            CURRENT_LLVM=$(grep "LLVM=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")
            CURRENT_SPIRV_TRANSLATOR=$(grep "SPIRV_TRANSLATOR=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")
            CURRENT_CLSPV=$(grep "CLSPV=" CURRENT_VERSIONS.txt | cut -d'=' -f2 || echo "")

            echo "Current versions:"
            echo "  glslang: $CURRENT_GLSLANG -> ${{ steps.versions.outputs.glslang }}"
            echo "  SPIRV-Cross: $CURRENT_SPIRV_CROSS -> ${{ steps.versions.outputs.spirv_cross }}"
            echo "  wgpu-native: $CURRENT_WGPU -> ${{ steps.versions.outputs.wgpu }}"
            echo "  Naga: $CURRENT_NAGA -> ${{ steps.versions.outputs.naga }}"
            echo "  LLVM: $CURRENT_LLVM -> ${{ steps.versions.outputs.llvm }}"
            echo "  SPIRV-LLVM-Translator: $CURRENT_SPIRV_TRANSLATOR -> ${{ steps.versions.outputs.spirv_translator }}"
            echo "  clspv: $CURRENT_CLSPV -> ${{ steps.versions.outputs.clspv }}"

            if [ "$CURRENT_GLSLANG" != "${{ steps.versions.outputs.glslang }}" ] || \
               [ "$CURRENT_SPIRV_CROSS" != "${{ steps.versions.outputs.spirv_cross }}" ] || \
               [ "$CURRENT_WGPU" != "${{ steps.versions.outputs.wgpu }}" ] || \
               [ "$CURRENT_NAGA" != "${{ steps.versions.outputs.naga }}" ] || \
               [ "$CURRENT_LLVM" != "${{ steps.versions.outputs.llvm }}" ] || \
               [ "$CURRENT_SPIRV_TRANSLATOR" != "${{ steps.versions.outputs.spirv_translator }}" ] || \
               [ "$CURRENT_CLSPV" != "${{ steps.versions.outputs.clspv }}" ]; then
              echo "New versions detected!"
              echo "needs_release=true" >> $GITHUB_OUTPUT
            else
              echo "All versions up to date"
              echo "needs_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Update versions file
        if: steps.check.outputs.needs_release == 'true'
        run: |
          cat > CURRENT_VERSIONS.txt << EOF
          GLSLANG=${{ steps.versions.outputs.glslang }}
          SPIRV_CROSS=${{ steps.versions.outputs.spirv_cross }}
          WGPU=${{ steps.versions.outputs.wgpu }}
          NAGA=${{ steps.versions.outputs.naga }}
          LLVM=${{ steps.versions.outputs.llvm }}
          SPIRV_TRANSLATOR=${{ steps.versions.outputs.spirv_translator }}
          CLSPV=${{ steps.versions.outputs.clspv }}
          UPDATED=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

      - name: Commit version changes
        if: steps.check.outputs.needs_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CURRENT_VERSIONS.txt
          git commit -m "Update dependency versions

          - glslang: ${{ steps.versions.outputs.glslang }}
          - SPIRV-Cross: ${{ steps.versions.outputs.spirv_cross }}
          - wgpu-native: ${{ steps.versions.outputs.wgpu }}
          - Naga: ${{ steps.versions.outputs.naga }}
          - LLVM: ${{ steps.versions.outputs.llvm }}
          - SPIRV-LLVM-Translator: ${{ steps.versions.outputs.spirv_translator }}
          - clspv: ${{ steps.versions.outputs.clspv }}"
          git push

      - name: Trigger release workflow
        if: steps.check.outputs.needs_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-release.yml',
              ref: 'main',
              inputs: {
                trigger_reason: 'Auto: upstream version update detected'
              }
            });

      - name: Summary
        run: |
          echo "## Dependency Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| glslang | ${{ steps.versions.outputs.glslang }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SPIRV-Cross | ${{ steps.versions.outputs.spirv_cross }} |" >> $GITHUB_STEP_SUMMARY
          echo "| wgpu-native | ${{ steps.versions.outputs.wgpu }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Naga | ${{ steps.versions.outputs.naga }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LLVM | ${{ steps.versions.outputs.llvm }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SPIRV-LLVM-Translator | ${{ steps.versions.outputs.spirv_translator }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clspv | ${{ steps.versions.outputs.clspv }} (main) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.needs_release }}" = "true" ]; then
            echo "🚀 **Release triggered** — new versions detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All dependencies up to date" >> $GITHUB_STEP_SUMMARY
          fi
